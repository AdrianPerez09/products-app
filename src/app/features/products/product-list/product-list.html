<h2>Products</h2>

<ul>
@for (product of products; track product.id) {

<div>
  <h3>Name: {{ product.name }}</h3>
  <p>Description: {{ product.description }}</p>
  <p>Price: {{ product.price | currency }}</p>
  <p>Category: {{ product.category.name }}</p>
  <p>Brand: {{ product.brand.name }}</p>
</div>
}
</ul>
